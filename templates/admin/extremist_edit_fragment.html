<form
  method="post"
  action="{{ edit_save_url }}"
  class="extremist-edit-form space-y-4"
>
  {% if csrf_token is defined and csrf_token %}
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  {% endif %}

  <div>
    <label for="extremist-fragment-raw_source" class="formLabel">Исходная строка</label>
    <Div
      class="inputField inputField__default inputField__disabled"
    >{{ form_data.raw_source or '' }}</div>
  </div>

  <div>
    <label for="extremist-fragment-full_name" class="formLabel">Полное наименование / ФИО</label>
    <input
      type="text"
      id="extremist-fragment-full_name"
      name="full_name"
      value="{{ form_data.full_name or '' }}"
      class="inputField inputField__default"
      placeholder="ФИО или наименование"
    >
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="extremist-fragment-area" class="formLabel">Область</label>
      <input
        type="text"
        id="extremist-fragment-area"
        value="{{ form_data.area_label or '' }}"
        class="inputField inputField__default inputField__disabled"
        disabled
      >
    </div>

    <div>
      <label for="extremist-fragment-type" class="formLabel">Тип</label>
      <input
        type="text"
        id="extremist-fragment-type"
        value="{{ form_data.type_label or '' }}"
        class="inputField inputField__default inputField__disabled"
        disabled
      >
    </div>
  </div>

  {% if form_data.type == 'fiz' and form_data.area == 'russian' %}
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="extremist-fragment-birth_date" class="formLabel">Дата рождения</label>
      <input
        type="date"
        id="extremist-fragment-birth_date"
        value="{{ form_data.birth_date or '' }}"
        class="inputField inputField__default inputField__disabled"
        disabled
      >
    </div>

    <div>
      <label for="extremist-fragment-birth_place" class="formLabel">Место рождения</label>
      <input
        type="text"
        id="extremist-fragment-birth_place"
        value="{{ form_data.birth_place or '' }}"
        class="inputField inputField__default inputField__disabled"
        disabled
      >
    </div>
  </div>
  {% endif %}

  <div>
    <label class="formLabel">Поисковые фразы</label>
    <div class="grid gap-3 grid-cols-2 mt-1">
      {% for term in form_data.search_terms %}
      <div>
        <input
          type="text"
          name="search_terms"
          value="{{ term }}"
          class="inputField inputField__default"
          placeholder="Фраза {{ loop.index }}"
        >
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="flex gap-2 pt-2">
    <button type="submit" class="btn btn__primary">
      <i class="fa fa-check"></i> Сохранить
    </button>
    <button type="button" class="btn btn__secondary" data-modal-close="extremist-edit-modal">
      Отмена
    </button>
  </div>
</form>
