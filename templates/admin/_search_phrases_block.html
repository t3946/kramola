<div class="search-phrases-block">
  <label class="formLabel">Поисковые фразы</label>
  <div class="flex gap-2 mt-1 mb-2">
    <input
      type="text"
      class="search-phrases-new inputField inputField__default flex-1"
      placeholder="Новая фраза"
    >
    <button type="button" class="btn btn__secondary search-phrases-add">
      Добавить
    </button>
  </div>
  <div class="search-phrases-list flex flex-col gap-2 mt-3 max-h-48 overflow-y-auto">
    {% for term in (form_data.search_terms | default([])) %}
    <div
      class="search-phrases-row grid gap-2"
      style="grid-template-columns: 120px 1fr auto;"
    >
      <select
        name="search_terms_type"
        class="inputField inputField__default"
        aria-label="Тип"
      >
        <option value="text" {{ 'selected' if (term.type | default('text')) == 'text' }}>Текст</option>
        <option value="surname" {{ 'selected' if (term.type | default('text')) == 'surname' }}>Фамилия</option>
        <option value="full_name" {{ 'selected' if (term.type | default('text')) == 'full_name' }}>ФИО</option>
      </select>
      <input
        type="text"
        name="search_terms_text"
        value="{{ term.text | default('') }}"
        class="inputField inputField__default"
        placeholder="Фраза"
      >
      <button type="button" class="btn btn__secondary search-phrases-remove" aria-label="Удалить">
        Удалить
      </button>
    </div>
    {% endfor %}
  </div>
</div>
