<div class="search-phrases-block">
  <label class="formLabel">Поисковые фразы</label>
  <div class="flex gap-2 mt-1 mb-2">
    <input
      type="text"
      class="search-phrases-new inputField inputField__default flex-1"
      placeholder="Новая фраза"
    >
    <button type="button" class="btn btn__secondary search-phrases-add">
      Добавить
    </button>
  </div>
  <div class="search-phrases-list grid gap-2 mt-3 grid-cols-2 max-h-48 overflow-y-auto">
    {% for term in (form_data.search_terms | default([])) if term %}
    <div>
      <input
        type="text"
        name="search_terms"
        value="{{ term }}"
        class="inputField inputField__default w-full"
        placeholder="Фраза"
      >
    </div>
    {% endfor %}
  </div>
</div>
